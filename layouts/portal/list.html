{{ define "main" }}
<div class="td-content portal-home">
	<div class="portal-home__container">
		<header class="portal-home__intro">
			<h1>{{ .Params.heading | default .Title }}</h1>
			{{ with .Params.description }}<p>{{ . | markdownify }}</p>{{ end }}
		</header>
		{{ .Content }}
		{{ partial "recent-updates.html" . }}
	</div>
</div>
{{ end -}}
